Neos:
  Flow:
    mvc:
      routes:
        'CodeQ.AsanaFeedback':
          position: 'start'

    security:
      authentication:
        providers:
          # activate the Neos backend session for the feedback endpoint so
          # the author identity can be determined server side
          'Neos.Neos:Backend':
            requestPatterns:
              'CodeQ.AsanaFeedback:FeedbackController':
                pattern: 'ControllerObjectName'
                patternOptions:
                  controllerObjectNamePattern: 'CodeQ\AsanaFeedback\Controller\.*'

  Fusion:
    defaultContext:
      AsanaFeedback: 'CodeQ\AsanaFeedback\Eel\FeedbackHelper'

  Neos:
    fusion:
      autoInclude:
        CodeQ.AsanaFeedback: true

    Ui:
      resources:
        javascript:
          'CodeQ.AsanaFeedback:Plugin':
            resource: 'resource://CodeQ.AsanaFeedback/Public/Backend/Plugin.js'
        stylesheets:
          'CodeQ.AsanaFeedback:Widget':
            resource: 'resource://CodeQ.AsanaFeedback/Public/Styles/Widget.css'

CodeQ:
  AsanaFeedback:
    # Whether the widget is rendered on the website frontend. The decision
    # is cached with the page, so disabled sites stay fully cacheable.
    # Authenticated Neos users always have the toolbar button inside the
    # Neos backend, independent of this flag.
    enableInFrontend: false

    asana:
      # Personal access token of the Asana integration user, provided via
      # environment so it is never part of versioned configuration.
      accessToken: '%env:ASANA_FEEDBACK_ACCESS_TOKEN%'
      apiBaseUri: 'https://app.asana.com/api/1.0'

    # The fixed Asana project every feedback task is created in.
    asanaProjectGid: ''

    # Assignee used when the visitor does not explicitly select one.
    defaultAssigneeGid: '422230010221'

    # Optional fixed section GID. When empty, the section is resolved at
    # submit time by looking up the project sections by name.
    asanaSectionGid: ''

    # Ordered list of section names used to resolve the target section
    # (matched case-insensitively against the project sections).
    asanaSectionNames:
      - 'Todo'
      - 'Todos'
      - 'Organisation'

    limits:
      screenshotBytes: 10485760
      videoBytes: 100000000
      descriptionCharacters: 10000

    rateLimit:
      # Requests per client IP; protects the public endpoint against abuse.
      maxPerMinute: 5
      maxPerHour: 40

    # Neos account identifiers of internal Code Q team members. Only these
    # users get the title field, the assignee selection and the Asana task
    # link on success.
    teamAccountIdentifiers:
      - 'admin'
      - 'roland.schuetz'
      - 'rolandschuetz'
      - 'felix.gradinaru'
      - 'felixgradinaru'
      - 'fg'
      - 'daniel.schmelz'
      - 'clara.borek'
      - 'michael.koepl'
      - 'dion.holder'

    # Selectable Asana assignees; keys are stable identifiers submitted by
    # the widget and validated server-side against this list. Entries with
    # "visibleToClient: true" can be selected by every user, the others
    # only by recognized Code Q team members. Yurii has no Neos account
    # but can be assigned.
    assignees:
      roland:
        label: 'Roland'
        asanaUserGid: '422230010221'
        avatar: 'resource://CodeQ.AsanaFeedback/Public/Images/Team/roland.jpg'
        visibleToClient: true
      felix:
